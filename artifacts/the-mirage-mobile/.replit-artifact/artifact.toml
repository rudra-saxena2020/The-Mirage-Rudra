kind = "mobile"
previewPath = "/the-mirage-mobile/"
title = "The Mirage Mobile"
version = "1.0.0"
id = "artifacts/the-mirage-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/the-mirage-mobile/" ]
localPort = 22342

[services.development]
run = "pnpm --filter @workspace/the-mirage-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/the-mirage-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/the-mirage-mobile", "run", "serve" ]

[services.env]
PORT = "22342"
BASE_PATH = "/the-mirage-mobile/"
